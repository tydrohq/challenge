[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.27"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read", path = "./addresses.json" }, { access = "read", path = "./" }]
ffi = false

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Fork config. INK_RPC_URL and FORK_BLOCK come from .env (see .env.example).
# Tests/scripts read these via vm.envString / vm.envUint in ForkBase.
[rpc_endpoints]
ink = "${INK_RPC_URL}"

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
